<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <span>🛒</span> Shop<span>Ease</span>
                </a>
                <h1>Create Account</h1>
                <p>Join ShopEase for a better shopping experience</p>
            </div>

            <form class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="reg-name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="reg-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="reg-phone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="reg-password" placeholder="Create a password (min 6 characters)" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="reg-confirm-password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <a href="index.html" class="btn btn-secondary" style="text-decoration: none;">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
