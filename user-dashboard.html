<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-main" style="padding: 16px 0;">
            <div class="container">
                <a href="index.html" class="logo">
                    <span>🛒</span> Shop<span>Ease</span>
                </a>
                <div class="header-actions">
                    <a href="cart.html" class="header-action">
                        <span class="icon">🛒</span>
                        <span class="count cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-page">
        <div class="container">
            <div class="dashboard-layout">
                <!-- Sidebar -->
                <div class="dashboard-sidebar">
                    <div class="user-profile">
                        <div class="user-avatar">U</div>
                        <h3 class="user-name">User</h3>
                        <p class="user-email">user@email.com</p>
                    </div>
                    <nav class="dashboard-nav">
                        <a href="#orders" class="dashboard-nav-link active" onclick="showSection('orders')">
                            <span class="icon">📦</span>
                            <span>My Orders</span>
                        </a>
                        <a href="#wishlist" class="dashboard-nav-link" onclick="showSection('wishlist')">
                            <span class="icon">❤️</span>
                            <span>Wishlist</span>
                        </a>
                        <a href="#profile" class="dashboard-nav-link" onclick="showSection('profile')">
                            <span class="icon">👤</span>
                            <span>Profile</span>
                        </a>
                        <a href="#addresses" class="dashboard-nav-link" onclick="showSection('addresses')">
                            <span class="icon">📍</span>
                            <span>Addresses</span>
                        </a>
                        <a href="#" class="dashboard-nav-link" onclick="logout()">
                            <span class="icon">🚪</span>
                            <span>Logout</span>
                        </a>
                    </nav>
                </div>

                <!-- Content -->
                <div class="dashboard-content">
                    <!-- Orders Section -->
                    <div class="dashboard-section active" id="section-orders">
                        <h2>My Orders</h2>
                        <div id="order-history-list">
                            <!-- Loaded by JS -->
                        </div>
                    </div>

                    <!-- Wishlist Section -->
                    <div class="dashboard-section" id="section-wishlist">
                        <h2>My Wishlist</h2>
                        <div class="wishlist-grid" id="wishlist-grid">
                            <!-- Loaded by JS -->
                        </div>
                    </div>

                    <!-- Profile Section -->
                    <div class="dashboard-section" id="section-profile">
                        <h2>Profile Settings</h2>
                        <form onsubmit="updateProfile(event)" style="max-width: 500px;">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="profile-name" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="profile-email" required>
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="profile-phone" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </form>
                    </div>

                    <!-- Addresses Section -->
                    <div class="dashboard-section" id="section-addresses">
                        <h2>Delivery Addresses</h2>
                        <div id="addresses-list">
                            <!-- Loaded by JS -->
                        </div>
                        <button class="btn btn-secondary" onclick="showAddAddressForm()" style="margin-top: 24px;">
                            ➕ Add New Address
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 ShopEase. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <button class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

    <script src="data/products.js"></script>
    <script src="js/script.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tracking.js"></script>
    
    <script>
        function showSection(section) {
            document.querySelectorAll('.dashboard-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.dashboard-nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById('section-' + section).classList.add('active');
            event.target.closest('.dashboard-nav-link').classList.add('active');
        }
        
        function loadUserData() {
            const user = getCurrentUser();
            
            if (!user) {
                showToast('Please login to view your account', 'warning');
                window.location.href = 'login.html';
                return;
            }
            
            // Update profile form
            document.getElementById('profile-name').value = user.name || '';
            document.getElementById('profile-email').value = user.email || '';
            document.getElementById('profile-phone').value = user.phone || '';
            
            // Load orders
            renderOrderHistory();
            
            // Load wishlist
            renderWishlist();
            
            // Load addresses
            renderAddresses();
        }
        
        function renderWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('shopease_wishlist')) || [];
            const container = document.getElementById('wishlist-grid');
            
            if (wishlist.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                        <p style="font-size: 48px; margin-bottom: 16px;">❤️</p>
                        <h3>Your wishlist is empty</h3>
                        <p style="color: var(--text-light);">Save items you like for later</p>
                        <a href="products.html" class="btn btn-primary" style="margin-top: 20px;">Browse Products</a>
                    </div>
                `;
                return;
            }
            
            const products = wishlist.map(id => getProductById(id)).filter(Boolean);
            
            container.innerHTML = products.map(product => renderProductCard(product)).join('');
        }
        
        function renderAddresses() {
            const user = getCurrentUser();
            const addresses = user?.addresses || [];
            const container = document.getElementById('addresses-list');
            
            if (addresses.length === 0) {
                container.innerHTML = `
                    <div style="padding: 40px; text-align: center; background: var(--background); border-radius: var(--radius);">
                        <p style="color: var(--text-light);">No addresses saved yet</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = addresses.map(addr => `
                <div style="padding: 20px; background: var(--background); border-radius: var(--radius-sm); margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; align-items: start;">
                        <div>
                            <strong>${addr.name}</strong>
                            <p style="color: var(--text-light); font-size: 14px;">${addr.phone}</p>
                            <p style="color: var(--text-light); font-size: 14px; margin-top: 8px;">
                                ${addr.address}, ${addr.city}
                            </p>
                        </div>
                        ${addr.isDefault ? '<span class="badge badge-primary">Default</span>' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function updateProfile(event) {
            event.preventDefault();
            
            const updates = {
                name: document.getElementById('profile-name').value.trim(),
                email: document.getElementById('profile-email').value.trim(),
                phone: document.getElementById('profile-phone').value.trim()
            };
            
            if (updateProfile(updates)) {
                loadUserData();
            }
        }
        
        function showAddAddressForm() {
            const name = prompt('Enter recipient name:');
            if (!name) return;
            
            const phone = prompt('Enter phone number:');
            if (!phone) return;
            
            const address = prompt('Enter full address:');
            if (!address) return;
            
            const city = prompt('Enter city:');
            if (!city) return;
            
            addAddress({ name, phone, address, city });
            renderAddresses();
        }
        
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
