<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEase</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <span>🛒</span> Shop<span>Ease</span>
                </a>
                <h1>Welcome Back!</h1>
                <p>Login to access your account</p>
            </div>

            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email or Phone</label>
                    <input type="text" id="login-email" placeholder="Enter email or phone" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <div class="remember-forgot">
                    <label>
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="#" style="color: var(--accent);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Create Account</a></p>
            </div>

            <div style="text-align: center; margin-top: 24px;">
                <a href="index.html" class="btn btn-secondary" style="text-decoration: none;">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
